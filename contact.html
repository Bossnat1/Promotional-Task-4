<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Contact</title>
</head>
<body>
    <div class="mb-15 ml-3">
        <h1 class="text-[30px]/7 text-black-800 mb-6">We are available 24/7 for enquiry and any question you might have.</h1>
        <div class="flex items-center">
            <img src="./phone call.jpg" alt="" class="h-[35px]">
            <span class="text-[25px]">08012345678 - Calls and Sms</span>
        </div>

        <div class="flex items-center">
            <img src="./whatsapp.jpg" alt="" class="h-[35px]">
            <span class="text-[25px]">09087654321 - WhatsApp</span>
        </div>
    </div>

    <form action="" class="m-3 h-[520px] w-auto bg-purple-100 p-6 md:w-[450px] md:m-auto">
        <div class="flex gap-23 mb-4 md:gap-33 items-center">
            <label for="name" class="text-[20px]">Full Name</label>
            <input type="text" class="px-1 py-1 border border-gray-300 rounded-md h-10" placeholder="Enter your name">
        </div>

        <div class="flex gap-24 mb-4 md:gap-40">
            <label for="email" class="text-[20px]">Email</label>
            <input type="email" class="px-1 py-1 border border-gray-300 rounded-md" placeholder="Enter your email">
        </div>

        <div class="flex gap-18 mb-4">
            <label for="phone" class="text-[20px]">Phone Number</label>
            <input type="number" class="px-1 py-1 border border-gray-300 rounded-md" placeholder="Mobile phone number">
        </div>

        <div class="flex gap-14 mb-4 items-center">
            <label for="country" class="text-[20px]">Country of Residence</label>
            <input type="text" class="px-1 py-1 h-10 border border-gray-300 rounded-md" placeholder="country">
        </div>

        <div class="flex gap-16 mb-6 items-center md:gap-33">
            <label for="message" class="text-[20px]">Message</label>
            <input type="text" class="px-1 py-1 h-25 border border-gray-300 rounded-md" placeholder="Enter your message">
        </div>

        <button class="px-5 bg-black text-white rounded-full py-3 ml-35 md:mt-12">Submit</button>
    </form>
</body>
</html>
